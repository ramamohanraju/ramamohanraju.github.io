<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Valley Wheels</title>
    <style>
        body { font-family: Arial, sans-serif; background: #faf5ff; color: #553c9a; padding: 10px; font-size: 13px; }
        .dealer-badge { display: inline-block; background: #805ad5; color: #fff; padding: 3px 8px; border-radius: 3px; font-size: 11px; margin-bottom: 6px; }
        h3 { font-size: 14px; margin-bottom: 4px; }
        .tagline { font-size: 11px; color: #4a5568; margin-bottom: 8px; }
        .cookie-item { font-family: monospace; font-size: 11px; padding: 2px 0; }
        .tag { font-size: 9px; font-weight: bold; padding: 1px 4px; border-radius: 2px; color: #fff; }
        .tag-lax { background: #d69e2e; }
        .tag-none { background: #805ad5; }
        #all-cookies { background: #e9d8fd; border-radius: 4px; padding: 6px; margin-top: 6px; font-family: monospace; font-size: 10px; word-break: break-all; max-height: 60px; overflow-y: auto; }
    </style>
</head>
<body>
    <span class="dealer-badge">DEALER: Valley Wheels</span>
    <h3>Valley Wheels</h3>
    <p class="tagline">Trade-Ins & Pre-Owned</p>
    <div class="cookie-item">valley_tradein = valley_ti_honda08 <span class="tag tag-none">None; Secure</span></div>
    <div class="cookie-item">valley_finance = valley_fin_preappr <span class="tag tag-lax">Lax</span></div>
    <div id="all-cookies"></div>
    <script>
        document.cookie = "valley_tradein=valley_ti_honda08; path=/; SameSite=None; Secure";
        document.cookie = "valley_finance=valley_fin_preappr; path=/; SameSite=Lax";
        function showCookies() { document.getElementById('all-cookies').textContent = document.cookie || '(none)'; }
        showCookies(); setInterval(showCookies, 2000);
    </script>
</body>
</html>
