<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Apex Motors</title>
    <style>
        body { font-family: Arial, sans-serif; background: #ebf8ff; color: #2a4365; padding: 10px; font-size: 13px; }
        .dealer-badge { display: inline-block; background: #2b6cb0; color: #fff; padding: 3px 8px; border-radius: 3px; font-size: 11px; margin-bottom: 6px; }
        h3 { font-size: 14px; margin-bottom: 4px; }
        .tagline { font-size: 11px; color: #4a5568; margin-bottom: 8px; }
        .cookie-item { font-family: monospace; font-size: 11px; padding: 2px 0; }
        .tag { font-size: 9px; font-weight: bold; padding: 1px 4px; border-radius: 2px; color: #fff; }
        .tag-lax { background: #d69e2e; }
        .tag-strict { background: #e53e3e; }
        #all-cookies { background: #bee3f8; border-radius: 4px; padding: 6px; margin-top: 6px; font-family: monospace; font-size: 10px; word-break: break-all; max-height: 60px; overflow-y: auto; }
    </style>
</head>
<body>
    <span class="dealer-badge">DEALER: Apex Motors</span>
    <h3>Apex Motors</h3>
    <p class="tagline">Premium SUVs & Trucks</p>
    <div class="cookie-item">apex_inventory = apex_inv_suv42 <span class="tag tag-lax">Lax</span></div>
    <div class="cookie-item">apex_lead = apex_lead_7f3a <span class="tag tag-strict">Strict</span></div>
    <div id="all-cookies"></div>
    <script>
        document.cookie = "apex_inventory=apex_inv_suv42; path=/; SameSite=Lax";
        document.cookie = "apex_lead=apex_lead_7f3a; path=/; SameSite=Strict";
        function showCookies() { document.getElementById('all-cookies').textContent = document.cookie || '(none)'; }
        showCookies(); setInterval(showCookies, 2000);
    </script>
</body>
</html>
